name: Pester Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pester:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: |
          # This suite is validated against Pester 6.0.0. The window below
          # (`-MinimumVersion 6.0.0 -MaximumVersion 6.999.999`) holds CI on
          # that major while floating patches/minors within it, so routine
          # releases never require a workflow edit. `-Force -MinimumVersion`
          # alone pulls the newest available major, which is a breaking-change
          # risk (Pester 6 itself broke unmatched-Mock fall-through behavior
          # relative to 5.x); the `-MaximumVersion` ceiling prevents CI from
          # silently jumping majors again. Both the floor and the ceiling are
          # bumped together, deliberately, on the next major migration — issue
          # #818 is the precedent for how that migration is done.
          Install-Module -Name Pester -Force -SkipPublisherCheck -MinimumVersion 6.0.0 -MaximumVersion 6.999.999
          Import-Module Pester -MinimumVersion 6.0.0 -MaximumVersion 6.999.999
          Install-Module -Name powershell-yaml -Force -SkipPublisherCheck
      - name: Run Pester tests (issue #243 audit-paths drift gate + grammar + safety)
        shell: pwsh
        run: |
          # Scope: per AC8 for #243, this workflow validates the hub artifact-paths audit
          # (drift gate + grammar) and the script-safety contract that gates it. The wider
          # .github/scripts/Tests/ suite contains pre-existing failures in unrelated
          # subsystems (OTel install, frame-credit ledger, SKILL.md size lints, etc.)
          # which are out of scope for #243 and tracked separately in issue #566.
          # Issue #610: structural deferral gate tests added to the allowlist.
          $config = New-PesterConfiguration
          $config.Run.Path = @(
            '.github/scripts/Tests/audit-hub-artifact-paths.Tests.ps1',
            '.github/scripts/Tests/hub-artifact-paths-coverage.Tests.ps1',
            '.github/scripts/Tests/script-safety-contract.Tests.ps1',
            '.github/scripts/Tests/named-decisions-write-discipline.Tests.ps1',
            '.github/scripts/Tests/engagement-record-marker-roundtrip.Tests.ps1',
            '.github/scripts/Tests/Test-DeferralCriteria.Tests.ps1',
            '.github/scripts/Tests/Add-FollowUpIssue.Tests.ps1',
            '.github/scripts/Tests/code-review-deferral-integration.Tests.ps1',
            '.github/scripts/Tests/gate-reconciliation.Tests.ps1',
            '.github/scripts/Tests/gate-hook-contract.Tests.ps1',
            '.github/scripts/Tests/path-migration-sweep-gate.Tests.ps1',
            '.github/scripts/Tests/Ensure-ScratchGitignore.Tests.ps1',
            '.github/scripts/Tests/audit-docs-mechanical.Tests.ps1',
            # render-portfolio tests — registered per d-ci-gate-registration (#692 s3)
            '.github/scripts/Tests/render-portfolio.Tests.ps1',
            # release-gate tests — registered per d-ci-gate-registration (#703 s2)
            '.github/scripts/Tests/release-gate.Tests.ps1',
            # entry-point-scope-parity test — registered per s4 (#703)
            '.github/scripts/Tests/entry-point-scope-parity.Tests.ps1',
            # wall-clock fixture guard — issue #723
            '.github/scripts/Tests/wall-clock-fixture-guard.Tests.ps1',
            # naming-register-policy gate — issue #732 s1
            '.github/scripts/Tests/naming-register-policy.Tests.ps1',
            # reporting-economy directive gate — registered per d-ci-gate-registration (#471)
            '.github/scripts/Tests/reporting-economy.Tests.ps1',
            '.github/scripts/Tests/reporting-economy-spotcheck.Tests.ps1',
            # Pester mock fall-through guard — issue #818 s6 (d-dead-filter-tripwire-v2)
            '.github/scripts/Tests/pester-mock-fallthrough-guard.Tests.ps1',
            # Post-port acceptance delta-gate core — issue #818 s7
            '.github/scripts/Tests/pester6-baseline-delta-core.Tests.ps1',
            # AGENTS.md BDD-heading guard — registered per issue #835
            '.github/scripts/Tests/bdd-scenario-contract.Tests.ps1',
            # session-cost-discipline contract gate — registered per d-ci-gate-registration (#474 s1)
            '.github/scripts/Tests/session-cost-discipline-contract.Tests.ps1',
            # design-grounding-discipline contract gate — registered per d-ci-gate-registration (#866)
            '.github/scripts/Tests/design-grounding-discipline.Tests.ps1',
            # grounding-evidence-corpus-check classifier gate — registered per d-ci-gate-registration (#866)
            '.github/scripts/Tests/grounding-evidence-corpus-check.Tests.ps1',
            # goal-run harness capability-probe instruments — issue #874 plan step 1
            '.github/scripts/Tests/goal-probe-streamjson.Tests.ps1',
            '.github/scripts/Tests/goal-probe-usage-reader.Tests.ps1',
            '.github/scripts/Tests/goal-probe-forcehalt-rig.Tests.ps1',
            # goal-run harness durable-state layer (halt schema/emitter, run-log
            # schema, goal_status reader) — issue #874 plan step 1
            '.github/scripts/Tests/goal-run-schemas.Tests.ps1',
            '.github/scripts/Tests/goal-run-log-schema.Tests.ps1',
            '.github/scripts/Tests/goal-run-transcript-core.Tests.ps1',
            '.github/scripts/Tests/goal-run-status-core.Tests.ps1',
            '.github/scripts/Tests/goal-run-halt-core.Tests.ps1',
            # goal-run harness worktree lifecycle (provision, state file,
            # teardown, deferred-teardown retry) — issue #874 plan steps 2-3
            '.github/scripts/Tests/goal-run-worktree-core.Tests.ps1',
            # session-cleanup-detector.ps1 — previously unlisted; registered
            # alongside its goal-run integration coverage (issue #874 plan step 3)
            '.github/scripts/Tests/session-cleanup-detector.Tests.ps1',
            # goal-run/* detector protection + reporting + aging escalation +
            # deferred-teardown retry — issue #874 plan step 3
            '.github/scripts/Tests/session-cleanup-detector-goal-run.Tests.ps1'
          )
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config
