name: Pester Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pester:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: |
          # Pin to the 5.x line. `-Force -MinimumVersion 5.0.0` alone pulls the
          # newest available major, which as of 2026-07 is Pester 6.0.0 — a
          # breaking major (unmatched Mocks throw instead of falling through to
          # the underlying command) that this suite, authored against Pester 5's
          # mock model, is not migrated to. The `-MaximumVersion` cap keeps CI on
          # the framework version the suite is validated against. Pester 6
          # migration is tracked separately in issue #818.
          Install-Module -Name Pester -Force -SkipPublisherCheck -MinimumVersion 5.0.0 -MaximumVersion 5.999.999
          Import-Module Pester -MaximumVersion 5.999.999
          Install-Module -Name powershell-yaml -Force -SkipPublisherCheck
      - name: Run Pester tests (issue #243 audit-paths drift gate + grammar + safety)
        shell: pwsh
        run: |
          # Scope: per AC8 for #243, this workflow validates the hub artifact-paths audit
          # (drift gate + grammar) and the script-safety contract that gates it. The wider
          # .github/scripts/Tests/ suite contains pre-existing failures in unrelated
          # subsystems (OTel install, frame-credit ledger, SKILL.md size lints, etc.)
          # which are out of scope for #243 and tracked separately in issue #566.
          # Issue #610: structural deferral gate tests added to the allowlist.
          $config = New-PesterConfiguration
          $config.Run.Path = @(
            '.github/scripts/Tests/audit-hub-artifact-paths.Tests.ps1',
            '.github/scripts/Tests/hub-artifact-paths-coverage.Tests.ps1',
            '.github/scripts/Tests/script-safety-contract.Tests.ps1',
            '.github/scripts/Tests/named-decisions-write-discipline.Tests.ps1',
            '.github/scripts/Tests/engagement-record-marker-roundtrip.Tests.ps1',
            '.github/scripts/Tests/Test-DeferralCriteria.Tests.ps1',
            '.github/scripts/Tests/Add-FollowUpIssue.Tests.ps1',
            '.github/scripts/Tests/code-review-deferral-integration.Tests.ps1',
            '.github/scripts/Tests/gate-reconciliation.Tests.ps1',
            '.github/scripts/Tests/gate-hook-contract.Tests.ps1',
            '.github/scripts/Tests/path-migration-sweep-gate.Tests.ps1',
            '.github/scripts/Tests/Ensure-ScratchGitignore.Tests.ps1',
            '.github/scripts/Tests/audit-docs-mechanical.Tests.ps1',
            # render-portfolio tests — registered per d-ci-gate-registration (#692 s3)
            '.github/scripts/Tests/render-portfolio.Tests.ps1',
            # release-gate tests — registered per d-ci-gate-registration (#703 s2)
            '.github/scripts/Tests/release-gate.Tests.ps1',
            # entry-point-scope-parity test — registered per s4 (#703)
            '.github/scripts/Tests/entry-point-scope-parity.Tests.ps1',
            # wall-clock fixture guard — issue #723
            '.github/scripts/Tests/wall-clock-fixture-guard.Tests.ps1',
            # naming-register-policy gate — issue #732 s1
            '.github/scripts/Tests/naming-register-policy.Tests.ps1',
            # reporting-economy directive gate — registered per d-ci-gate-registration (#471)
            '.github/scripts/Tests/reporting-economy.Tests.ps1',
            '.github/scripts/Tests/reporting-economy-spotcheck.Tests.ps1'
          )
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config
