# hub-artifact-paths-classification.yml
# Schema docstring — authoritative single source for:
#
# Placeholder normalization set (D2a):
#   {ID}, {PR}, {NUMBER}, {name}, {port}, {ISSUE_NUMBER}, {N}, {Surface}
#   All eight are normalized to '*' before path_family clustering.
#
# claude_resolves allowed values:
#   'plugin-cache' | 'source-tree' | 'both' | 'none' | 'not-applicable'
#   not-applicable: family exists only for the other tool (e.g., agents/{name}.md
#                   Claude shells don't exist from Copilot's perspective).
#
# copilot_resolves allowed values:
#   'plugin-manifest' | 'source-tree' | 'both' | 'none' | 'not-applicable'
#
# experience allowed values:
#   'silent-skip' | 'wasted-tool-call' | 'visible-warning' | 'hard-failure'
#   (what happens when a downstream consumer tries to resolve a path in this
#   family and it's absent or misresolved)
#
# requires_version_bump:
#   true | false  (does modifying files in this family require a plugin version bump?)
#
# Known consumers of this schema docstring:
#   .github/scripts/audit-hub-artifact-paths.ps1
#   .github/scripts/Tests/audit-hub-artifact-paths.Tests.ps1
#   .github/scripts/Tests/hub-artifact-paths-coverage.Tests.ps1
#
# families:

families:
  "agents/*.agent.md":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - agents/Code-Smith.agent.md
      - agents/Code-Conductor.agent.md
      - agents/Code-Critic.agent.md
    notes: "Shared agent bodies; loaded by paired Claude shells via D1 plugin-cache-first
      chain (installed_plugins.json -> plugin-cache path) with source-repo CWD as fallback.
      Copilot reads directly from source tree in the hub repo. Missing body = agent dispatch
      fails at first Read call."

  "agents/*.md":
    claude_resolves: plugin-cache
    copilot_resolves: not-applicable
    requires_version_bump: true
    experience: hard-failure
    examples:
      - agents/code-smith.md
      - agents/code-critic.md
      - agents/spine-runner.md
    notes: "Claude-only subagent shells; paired to shared agent bodies; registered via the
      explicit agents[] array in .claude-plugin/plugin.json. Not applicable for Copilot tool
      perspective — Copilot uses .agent.md bodies directly. Missing shell = subagent_type
      dispatch fails in Claude."

  "commands/*.md":
    claude_resolves: plugin-cache
    copilot_resolves: not-applicable
    requires_version_bump: true
    experience: hard-failure
    examples:
      - commands/orchestrate.md
      - commands/spine-run.md
      - commands/orchestra-review.md
    notes: "Claude Code slash command entry points registered via the commands[] array in
      .claude-plugin/plugin.json. Copilot slash commands are a distinct surface — these
      .md command files are not applicable from Copilot's perspective."

  "skills/*/SKILL.md":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - skills/implementation-discipline/SKILL.md
      - skills/parallel-execution/SKILL.md
      - skills/session-startup/SKILL.md
    notes: "Core skill bodies. Paths like 'bdd-scenarios/SKILL.md', 'customer-experience/SKILL.md',
      'plugin-release-hygiene/SKILL.md', 'post-pr-review/SKILL.md', and 'session-startup/SKILL.md'
      appearing without the skills/ prefix are relative references from within skill subdirectories
      and map to this same family. Both Claude (plugin-cache D1 or source-tree fallback) and
      Copilot (source-tree) must resolve these for agent methodology to function."

  "skills/*/platforms/*.md":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - skills/session-startup/platforms/claude.md
      - skills/upstream-onboarding/platforms/claude.md
      - skills/parallel-execution/platforms/copilot.md
    notes: "Platform-specific invocation details for each skill. Bare-relative references
      'platforms/claude.md' and 'platforms/copilot.md' appearing in skill body text are
      relative to the containing skill directory and map to this family. Missing = agent
      uses wrong platform bindings or silently omits platform-specific steps."

  "skills/*/references/*.md":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - skills/calibration-pipeline/references/findings-construction.md
      - skills/validation-methodology/references/post-judgment-routing.md
      - skills/parallel-execution/references/error-handling.md
    notes: "Reference sub-documents within skill directories. Bare-relative paths such as
      'references/anti-patterns.md', 'references/commands.md', 'references/quality-gates.md',
      and 'references/test-patterns.md' appearing in skill body text are relative references
      that map to this family. Missing reference docs produce hard-failure when a skill body
      tries to Read them during execution."

  "skills/*/adapters/*.md":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - skills/process-retrospective/adapters/process-retrospective-explicit-skip-adapter.md
      - skills/process-retrospective/adapters/process-retrospective-auto-na-adapter.md  # deferred — file intentionally absent until #348 lands
      - skills/{skill}/adapters/{adapter}.md
    notes: "Frame adapter documents nested within skill directories. Bare-relative paths
      'adapters/{port}.md', 'adapters/{port}-auto-na-adapter.md', 'adapters/experience-auto-na-adapter.md',
      'adapters/{port}-explicit-skip-adapter.md', and 'adapters/experience-explicit-skip-adapter.md' are
      relative references from skill body text that map to this family. Predicate adapters use the
      unified suffix convention: {port}-auto-na-adapter.md and {port}-explicit-skip-adapter.md."

  "skills/*/scripts/*.ps1":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: visible-warning
    examples:
      - skills/session-startup/scripts/post-merge-cleanup.ps1
      - skills/session-startup/scripts/session-cleanup-detector.ps1
      - skills/plugin-release-hygiene/scripts/plugin-release-hygiene-hook.ps1
    notes: "PowerShell helper scripts nested within skill directories. Bare-relative paths
      'scripts/session-cleanup-detector.ps1' appearing in skill text, and 'lib/*.ps1' paths
      (e.g., 'lib/cost-anomaly.ps1', 'lib/frame-spine-core.ps1') referenced from within
      skills/copilot-cost-collection/ context, map to this family or skills/lib/*.ps1.
      Missing script produces visible-warning rather than hard-failure because the skill
      body can fall back to inline guidance."

  "../skills/*/scripts/*.ps1":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: visible-warning
    examples:
      - ../skills/session-startup/scripts/session-cleanup-detector.ps1
    notes: "../-prefixed form of 'skills/*/scripts/*.ps1' referenced from .github/scripts/
      context (e.g., test-session-cleanup-detector.ps1). Resolves to the same physical
      scripts as the skills/*/scripts/*.ps1 family; introduced by #664 forward-slash
      path conversion which activated forward-slash path extraction."

  "skills/*/assets/*.json":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - skills/routing-tables/assets/gate-criteria.json
      - skills/routing-tables/assets/routing-config.json
    notes: "JSON data assets nested within skill directories. Bare-relative paths
      'assets/gate-criteria.json' and 'assets/routing-config.json' appearing in skill body
      text are relative references that map to this family. Routing logic that reads these
      files will hard-fail if they are missing."

  "skills/*/schemas/*.json":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - skills/solution-authoring/schemas/gate-decision-token.schema.json
    notes: "JSON Schema definitions nested within skill directories. The
      gate-decision-token schema (#617) defines the L0 classification-decision token
      consumed by gate-reconciliation-core.ps1 (L2) and the Code-Critic missed-gate
      perspective (L3). Consumers that reference or validate against the schema will
      hard-fail if it is missing."

  ".claude-plugin/*.json":
    claude_resolves: plugin-cache
    copilot_resolves: not-applicable
    requires_version_bump: false
    experience: hard-failure
    examples:
      - .claude-plugin/plugin.json
      - .claude-plugin/marketplace.json
    notes: "Claude plugin manifest files. plugin.json is the version-triggering artifact
      itself — modifying it does not require a separate bump because the bump IS the edit
      to plugin.json. marketplace.json is the marketplace descriptor. Not applicable from
      Copilot's perspective. Missing or malformed plugin.json = Claude cannot load the
      plugin at all."

  ".github/scripts/*.ps1":
    claude_resolves: plugin-cache
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: visible-warning
    examples:
      - .github/scripts/bump-version.ps1
      - .github/scripts/frame-credit-ledger.ps1
      - .github/scripts/normalize-whitespace.ps1
    notes: "Root-level hook and utility scripts under .github/scripts/. Claude loads from
      plugin-cache; Copilot runs from source-tree. Missing script produces visible-warning
      because the hook that calls it will report an error but does not block the pipeline."

  ".github/scripts/lib/*.ps1":
    claude_resolves: plugin-cache
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: visible-warning
    examples:
      - .github/scripts/lib/cost-walker-copilot.ps1
      - .github/scripts/lib/frame-credit-ledger-core.ps1
    notes: "Shared library scripts loaded by root hook scripts under .github/scripts/lib/.
      Sourced as dependencies at runtime; missing lib script propagates as a visible-warning
      from the calling hook."

  ".github/scripts/Tests/*.Tests.ps1":
    claude_resolves: plugin-cache
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: visible-warning
    examples:
      - .github/scripts/Tests/bdd-scenario-contract.Tests.ps1
      - .github/scripts/Tests/subagent-env-handshake.Tests.ps1
    notes: "Pester test files. Absent tests produce visible-warning in CI (tests are
      skipped or the suite reports fewer cases) but do not block agent dispatch."

  ".github/scripts/Tests/fixtures/*.ps1":
    claude_resolves: plugin-cache
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: visible-warning
    examples:
      - .github/scripts/Tests/fixtures/subagent-env-handshake-verifier.ps1
    notes: "Test fixture scripts. Missing fixture causes the referencing Pester test to
      fail with a visible error rather than hard-blocking a pipeline run."

  ".github/plugin/marketplace.json":
    claude_resolves: plugin-cache
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - .github/plugin/marketplace.json
    notes: "Marketplace descriptor residing under .github/plugin/. Distinct from
      .claude-plugin/marketplace.json; this copy is consumed by the GitHub-hosted
      plugin marketplace integration. Missing = marketplace cannot resolve the plugin."

  ".github/architecture-rules.md":
    claude_resolves: source-tree
    copilot_resolves: source-tree
    requires_version_bump: false
    experience: visible-warning
    examples:
      - .github/architecture-rules.md
    notes: "Hub-repo architecture rules. Consumer repos maintain their own copy; the hub
      copy is a template. Intentionally hub-only per the plan (carved out). Missing produces
      visible-warning because Copilot instructions reference it but can fall back."

  ".github/copilot-instructions.md":
    claude_resolves: source-tree
    copilot_resolves: source-tree
    requires_version_bump: false
    experience: visible-warning
    examples:
      - .github/copilot-instructions.md
    notes: "Copilot system prompt injected by GitHub. Intentionally hub-only; consumer
      repos maintain their own. Missing = Copilot operates without hub-level instruction
      context (visible-warning, not hard-failure)."

  ".github/instructions/*.instructions.md":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .github/instructions/browser-mcp.instructions.md
      - .github/instructions/browser-tools.instructions.md
      - .github/instructions/local-gotchas.instructions.md
    notes: "Consumer-generated VS Code / Copilot instruction files. Not distribution
      artifacts; created per consumer repo setup. Attempting to resolve these from the
      plugin cache or a different consumer repo results in a wasted tool call."

  ".claude/settings.json":
    claude_resolves: none
    copilot_resolves: not-applicable
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .claude/settings.json
    notes: "Consumer-generated Claude Code project settings. Not a distribution artifact;
      each consumer repo creates its own. Reading from plugin cache or another repo's tree
      is a wasted tool call."

  ".claude/settings.local.json":
    claude_resolves: none
    copilot_resolves: not-applicable
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .claude/settings.local.json
    notes: "Consumer-generated local overrides for Claude Code settings. gitignored;
      not committed to hub or consumer repos. Attempting to resolve is always a wasted
      tool call."

  ".claude/.state/*.json":
    claude_resolves: none
    copilot_resolves: not-applicable
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .claude/.state/release-hygiene-{slug}.json
    notes: "Claude runtime state files written by the plugin-release-hygiene hook.
      Session-scoped; not distribution artifacts. Placeholders like {slug} are
      session-scoped runtime tokens; only the D2a eight ({ID}, {PR}, {NUMBER}, {name},
      {port}, {ISSUE_NUMBER}, {N}, {Surface}) are normalized for path-family clustering.
      Attempting to resolve from plugin cache is a wasted tool call."

  ".references/index.json":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .references/index.json
    notes: "Generated project-reference lookup index in consumer repos. Not a hub
      distribution artifact; refreshed by /setup-references from sidecars in the active
      repository. Attempting to resolve it from the plugin cache or another repo is a
      wasted tool call."

  "/memories/session/*.md":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - /memories/session/plan-issue-{ID}.md
      - /memories/session/design-issue-{ID}.md
      - /memories/session/review-state-{ID}.md
    notes: "Claude Code session-only memory files written during a live session. Not
      distribution artifacts and not committed to any repo. Placeholders {ID} and {N} are
      in the D2a set; {id} (lowercase), {scope}, {primary}, {secondary1}, {secondaryN}
      are session-scoped runtime tokens, not D2a-normalized. Only the canonical eight
      ({ID}, {PR}, {NUMBER}, {name}, {port}, {ISSUE_NUMBER}, {N}, {Surface}) are
      normalized for path-family clustering. Any agent that tries to Read a path in this
      family when no session is active performs a wasted tool call."

  ".copilot-tracking/*.yml":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .copilot-tracking/issue-42-my-feature.yml
    notes: "Consumer-repo Copilot tracking files for in-progress issues. Not distribution
      artifacts. Consumer-specific; attempting to resolve from the hub repo or plugin cache
      is a wasted tool call."

  ".copilot-tracking/*.json":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .copilot-tracking/calibration/review-data.json
    notes: "Consumer-repo Copilot tracking data files (e.g., calibration review data).
      Not distribution artifacts. Attempting to resolve outside the consumer repo is a
      wasted tool call."

  ".copilot-tracking/*.md":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .copilot-tracking/research/{YYYYMMDD-name}-research.md
      - .copilot-tracking/reviews/{date}-process-review.md
    notes: "Consumer-repo research and process-review markdown files produced during
      Copilot sessions. Not distribution artifacts."

  ".vscode/settings.json":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .vscode/settings.json
    notes: "Consumer-generated VS Code workspace settings. Not a distribution artifact.
      gitignored or consumer-specific; never resolved from the hub repo or plugin cache."

  ".tmp/*":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - .tmp/issue-{ISSUE_NUMBER}-body.md
      - .tmp/{N}-comments.json
    notes: "Agent scratch / temp-file workspace (introduced in issue #643). Gitignored,
      consumer-local scratch directory where agents write transient working files (issue-body
      drafts, comment payloads, engagement-record mirrors) per skills/terminal-hygiene/SKILL.md
      Scratch & Temp-File Hygiene. Not a distribution artifact and not committed to any repo.
      Literal example paths such as .tmp/issue-643-body.md and .tmp/643-comments.json appearing
      in skill body text map to this family. The agent treats this path as consumer-local
      session scratch; attempting to resolve it from the hub repo or plugin cache is a wasted
      tool call."

  "Documents/.references.yml":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - Documents/.references.yml
    notes: "Optional directory-level project-reference sidecar in consumer repos.
      Per-document sidecars override it; it is not a hub distribution artifact.
      Attempting to resolve it from the plugin cache or another repo is a wasted tool call."

  "Documents/INDEX.md":
    claude_resolves: none
    copilot_resolves: none
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - Documents/INDEX.md
    notes: "Generated project-reference documentation index in consumer repos. Not a
      hub distribution artifact; refreshed by /setup-references from the active repo's
      reference sidecars. Attempting to resolve it from the plugin cache or another repo
      is a wasted tool call."

  "Documents/Design/*.md":
    claude_resolves: source-tree
    copilot_resolves: source-tree
    requires_version_bump: false
    experience: visible-warning
    examples:
      - Documents/Design/frame-architecture.md
      - Documents/Design/session-memory-contract.md
      - Documents/Design/hub-artifact-paths-audit.md
    notes: "Hub-repo design documents (.md files). Intentionally hub-only per the plan (carved out).
      Agents and skills cross-reference these for design intent, but consumers do not
      receive them. Paths with {domain-slug} and {domain} placeholders are D2a-normalized.
      Missing = agent proceeds without design context (visible-warning, not hard-failure)."

  "Documents/Design/*.yml":
    claude_resolves: source-tree
    copilot_resolves: source-tree
    requires_version_bump: false
    experience: visible-warning
    examples:
      - Documents/Design/hub-artifact-paths-classification.yml
    notes: "Hub-repo design YAML data files (e.g., classification schemas). Intentionally
      hub-only per the plan (carved out). Same resolution and experience semantics as
      Documents/Design/*.md — agents that cross-reference these for schema or classification
      data will proceed without that context if the file is absent (visible-warning)."

  "frame/ports/*.yaml":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - frame/ports/process-retrospective.yaml
      - frame/ports/{port}.yaml
    notes: "Frame port declaration files. Consumed by Code-Conductor to validate adapter
      presence for each step. Placeholder {port} is D2a-normalized. Missing = Conductor
      cannot verify port fill status, producing hard-failure in frame-spine validation."

  "frame/pipeline-metrics-v4-schema.md":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - frame/pipeline-metrics-v4-schema.md
    notes: "Frame pipeline metrics schema document. Authoritative schema for the
      <!-- pipeline-metrics --> block format. Missing = credit-emission agents cannot
      validate block structure."

  "examples/{stack}/*.md":
    claude_resolves: source-tree
    copilot_resolves: source-tree
    requires_version_bump: false
    experience: wasted-tool-call
    examples:
      - examples/{stack}/architecture-rules.md
      - examples/{stack}/copilot-instructions.md
    notes: "Example consumer-repo templates. Placeholder {stack} is D2a-normalized.
      These are reference templates for new consumer repo setup, not loaded at runtime.
      Attempting to resolve a specific example path during agent execution is a wasted
      tool call."

  "hooks/hooks.json":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: hard-failure
    examples:
      - hooks/hooks.json
    notes: "Bare-relative reference from within a skill body pointing to the root
      hooks/hooks.json Copilot hooks configuration. Copilot reads from source-tree;
      Claude loads from plugin-cache. Missing = hook registration fails for Copilot."

  "templates/*.md":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: visible-warning
    examples:
      - templates/describe-block.md
      - templates/test-file.md
    notes: "Bare-relative template references from within skill bodies (e.g., referenced
      as 'templates/describe-block.md' from a skill directory). Provide scaffolding
      patterns for BDD/test authoring. Missing = agent proceeds without template guidance
      (visible-warning, not hard-failure, since inline examples can substitute)."

  "workflows/*.md":
    claude_resolves: both
    copilot_resolves: source-tree
    requires_version_bump: true
    experience: visible-warning
    examples:
      - workflows/make-tests-pass.md
      - workflows/refactor-safely.md
      - workflows/validate-coverage.md
    notes: "Bare-relative workflow recipe references from within skill bodies. These
      provide step-by-step execution guides. Missing = agent falls back to inline
      methodology in the skill body (visible-warning, not hard-failure)."

